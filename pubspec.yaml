name: minpro2_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.19.0
  supabase_flutter: ^2.5.6
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/GlowUp.png
    - assets/images/Welcome.png
    - assets/images/flowers.jpeg

  fonts:
    - family: CloudLucent
      fonts:
        - asset: assets/fonts/cloud-lucent-regular.otf

    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/playfair-display.bold-italic.ttf
